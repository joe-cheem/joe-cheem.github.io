<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        :root {
            --primary-color: #8A2BE2;
            --secondary-color: #4B0082;
            --background-color: #0D0015;
            --text-color: #E6E6FA;
            --accent-color: #FFD700;
        }
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 0; /* Adjust based on your navbar height */
        }
        nav {
            background-color: var(--secondary-color);
            padding: 1rem;
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: transform 0.3s ease-in-out;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        nav.hidden {
            transform: translateY(-90%);
        }
        nav:hover {
            transform: translateY(0);
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        nav ul li a:hover {
            color: var(--accent-color);
        }
        .music-player {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }
        .music-player h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .control-btn {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover {
            background-color: var(--accent-color);
            color: var(--background-color);
        }
        .play-pause-btn {
            width: 50px;
            height: 50px;
            font-size: 24px;
        }
        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            margin: 20px 0;
            height: 10px;
            position: relative;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-display {
            font-size: 14px;
            color: var(--text-color);
            text-align: center;
            margin-top: 10px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .volume-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 5px;border-radius: 5px;
            background: var(--primary-color);
            outline: none;
            margin: 0 10px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
        }
        .song-list {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .song-list li {
            background-color: rgba(255, 255, 255, 0.1);
            margin-bottom: 5px;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .song-list li:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .song-list li.active {
            background-color: var(--accent-color);
            color: var(--background-color);
        }
        #visualizer {
            width: 100%;
            height: 100px;
            background-color: rgba(0, 0, 0, 0.3);
            margin-top: 20px;
            border-radius: 10px;
        }
        @media (max-width: 600px) {
            .music-player {
                width: 95%;
                padding: 15px;
            }
            .control-btn {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
            .play-pause-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <ul>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#games">Games</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="music-player.html">Music</a></li>
        </ul>
    </nav>
    <div class="music-player">
        <h2>My Tracks</h2>
        <audio id="audioPlayer"></audio>
        <canvas id="visualizer"></canvas>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
        <div class="player-controls">
            <button id="prevBtn" class="control-btn">⏮</button>
            <button id="playPauseBtn" class="control-btn play-pause-btn">▶</button>
            <button id="nextBtn" class="control-btn">⏭</button>
        </div>
        <div class="volume-control">
            <span>🔈</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="1">
            <span>🔊</span>
        </div>
        <ul class="song-list" id="songList">
            <!-- Song list items will be dynamically added here -->
        </ul>
    </div>

    <script>
        const navbar = document.getElementById('navbar');
        let lastScrollTop = 0;
        const scrollThreshold = 100; // Adjust this value to change when the navbar starts hiding

        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > scrollThreshold) {
                navbar.classList.add('hidden');
            } else {
                navbar.classList.remove('hidden');
            }
            lastScrollTop = scrollTop;
        });

        // Show navbar on hover
        navbar.addEventListener('mouseenter', () => {
            navbar.classList.remove('hidden');
        });

        // Hide navbar when clicking a link if below threshold
        navbar.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                if (scrollTop > scrollThreshold) {
                    navbar.classList.add('hidden');
                }
            });
        });

        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progress = document.getElementById('progress');
        const timeDisplay = document.getElementById('timeDisplay');
        const volumeSlider = document.getElementById('volumeSlider');
        const songList = document.getElementById('songList');
        const visualizer = document.getElementById('visualizer');
        
        let audioContext;
        let analyser;
        let source;

        const songs = [
            { title: "Song 1", file: "song1.mp3" },
            { title: "Song 2", file: "song2.mp3" },
            { title: "Song 3", file: "song3.mp3" }
        ];

        let currentSongIndex = 0;

        function initAudioContext() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    source = audioContext.createMediaElementSource(audioPlayer);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    console.log("Audio context initialized successfully");
                } catch (error) {
                    console.error("Error initializing audio context:", error);
                }
            }
        }

        songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.textContent = song.title;
            li.addEventListener('click', () => playSong(index));
            songList.appendChild(li);
        });

        function playSong(index) {
            currentSongIndex = index;
            audioPlayer.src = songs[index].file;
            console.log("Loading song:", songs[index].file);
            
            audioPlayer.load();
            
            if (!audioContext) {
                initAudioContext();
            }
            
            audioPlayer.play().then(() => {
                console.log("Song started playing");
                playPauseBtn.textContent = '❚❚';
                updateActiveSong();
            }).catch(e => {
                console.error('Error playing audio:', e);
                alert("Error playing audio. Check console for details.");
            });
        }

        function updateActiveSong() {
            songList.querySelectorAll('li').forEach((li, index) => {
                if (index === currentSongIndex) {
                    li.classList.add('active');
                } else {
                    li.classList.remove('active');
                }
            });
        }

        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', playPreviousSong);
        nextBtn.addEventListener('click', playNextSong);
        audioPlayer.addEventListener('timeupdate', updateProgress);
        volumeSlider.addEventListener('input', adjustVolume);

        function togglePlayPause() {
            if (!audioContext) {
                initAudioContext();
                playSong(currentSongIndex);
                setupVisualizer();
            } else if (audioPlayer.paused) {
                audioPlayer.play().then(() => {
                    playPauseBtn.textContent = '❚❚';
                }).catch(e => console.error('Error resuming playback:', e));
            } else {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶';
            }
        }

        function playPreviousSong() {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            playSong(currentSongIndex);
        }

        function playNextSong() {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            playSong(currentSongIndex);
        }

        function updateProgress() {
            if (!isNaN(audioPlayer.duration)) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progress.style.width = `${percent}%`;
                timeDisplay.textContent = `${formatTime(audioPlayer.currentTime)} / ${formatTime(audioPlayer.duration)}`;
            }
        }

        function seek(e) {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;
            if (!isNaN(audioPlayer.duration) && isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = percent * audioPlayer.duration;
            }
        }

        progressContainer.addEventListener('click', seek);

        progressContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            seek(e.touches[0]);
        });

        function adjustVolume() {
            audioPlayer.volume = volumeSlider.value;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function setupVisualizer() {
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const ctx = visualizer.getContext('2d');
            const WIDTH = visualizer.width;
            const HEIGHT = visualizer.height;

            function drawVisualizer() {
                requestAnimationFrame(drawVisualizer);

                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);

                const barWidth = (WIDTH / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] / 2;

                    // Rainbow color
                    const hue = i / bufferLength * 360;
                    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                    ctx.fillRect(x, HEIGHT - barHeight, barWidth, barHeight);

                    x += barWidth + 1;
                }
            }

            drawVisualizer();
        }

        audioPlayer.addEventListener('ended', playNextSong);

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = visualizer.getBoundingClientRect();
            visualizer.width = rect.width * dpr;
            visualizer.height = rect.height * dpr;
            const ctx = visualizer.getContext('2d');
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Initialize with the first song
        audioPlayer.src = songs[currentSongIndex].file;
        updateActiveSong();

        // Enable audio playback on mobile
        document.body.addEventListener('touchstart', function() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, false);

        // Ensure the audio context is resumed on user interaction
        document.addEventListener('click', function() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });

        // Handle page visibility changes
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶';
            }
        });
    </script>
</body>
</html>
