<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneZone Player - Joachim Rayski</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/tonezone.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
    <link rel="manifest" href="/favicons/site.webmanifest">
    <link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="/favicons/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="/favicons/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
</head>
<body>
    <div id="deep-space-background"></div>

    <nav id="navbar">
        <ul>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#projects">Project Browser</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="tonezone-player.html">ToneZone</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="music-player">
            <h2>ToneZone</h2>
            <div class="eight-bit-display">
                <div id="song-title" class="song-title"></div>
            </div>
            <div id="progressContainer" class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="timeDisplay" class="time-display">0:00 / 0:00</div>
            <div class="player-controls">
                <button id="prevBtn" class="control-btn">⟪</button>
                <button id="playPauseBtn" class="control-btn">▶</button>
                <button id="nextBtn" class="control-btn">⟫</button>
            </div>
            <div class="volume-control desktop-only">
                <span class="volume-icon">🔈</span>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="1">
                <span class="volume-icon">🔊</span>
            </div>
            <ul id="songList" class="song-list"></ul>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="js/common.js"></script>
    <script src="js/tonezone-script.js"></script>
</body>
</html>
