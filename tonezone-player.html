<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneZone Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav id="navbar">
        <ul>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#games">Games</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="tonezone-player.html">ToneZone</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="music-player">
            <h2>ToneZone</h2>
            <div class="now-playing">
                <img id="albumArt" src="placeholder-album-art.jpg" alt="Album Art">
                <div class="track-info">
                    <h3 id="trackTitle">Track Title</h3>
                    <p id="artistName">Artist Name</p>
                </div>
            </div>
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="timeDisplay" class="time-display">0:00 / 0:00</div>
            <div class="player-controls">
                <button id="prevBtn" class="control-btn">&#9198;</button>
                <button id="playPauseBtn" class="control-btn">&#9658;</button>
                <button id="nextBtn" class="control-btn">&#9197;</button>
            </div>
            <div class="volume-control">
                <span class="volume-icon">&#128266;</span>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="1">
            </div>
            <ul id="songList" class="song-list"></ul>
            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <script src="tonezone-script.js"></script>
</body>
</html>
