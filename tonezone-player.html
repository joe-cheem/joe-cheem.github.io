<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneZone Player - Joachim Rayski</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/tonezone.css">
</head>
<body>
    <div id="deep-space-background"></div>

    <nav id="navbar">
        <ul>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#projects">Project Browser</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="tonezone-player.html">ToneZone</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="music-player">
            <h2>ToneZone</h2>

            <div id="progressContainer" class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="timeDisplay" class="time-display">0:00 / 0:00</div>

            <div class="player-controls">
                <button id="prevBtn">⏮</button>
                <button id="playPauseBtn">▶</button>
                <button id="nextBtn">⏭</button>
            </div>

            <div class="volume-control">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                <span>🔊</span>
            </div>

            <ul id="songList" class="song-list"></ul>

            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="js/tonezone-script.js"></script>
</body>
</html>
