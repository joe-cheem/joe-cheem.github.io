<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Portfolio</title>
    <style>
        :root {
            --primary-color: #8A2BE2;
            --secondary-color: #4B0082;
            --background-color: #0D0015;
            --text-color: #E6E6FA;
            --accent-color: #FFD700;
        }
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
            scroll-behavior: smooth;
        }
        header {
            background: url('banner.png') no-repeat center center;
            background-size: cover;
            color: #fff;
            text-align: center;
            padding: 4rem 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        header h1 {
            font-size: 3rem;
            margin: 0;
            animation: fadeInTitle 2s ease-out forwards;
        }
        header p {
            font-size: 1.2rem;
            margin: 0.5rem 0 0;
            animation: fadeInSubtitle 2.5s ease-out forwards;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to top, var(--background-color), transparent);
        }
        @keyframes fadeInTitle {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInSubtitle {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        nav {
            background-color: var(--secondary-color);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: top 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        nav ul li a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
        }
        .section {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
        }
        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.8);
        }
        .section-divider {
            width: 100%;
            height: 50px;
            background: var(--background-color);
            clip-path: polygon(0 0, 100% 100%, 0 100%);
        }
        .video-container {
            margin-bottom: 20px;
        }
        .video-container iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }
        .floating-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }
        .floating-stars::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, transparent, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.9));
            transform: translateX(-50%);
            animation: floatStars 100s linear infinite;
        }
        @keyframes floatStars {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-100%); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p>Game Developer & Musician</p>
        <div class="floating-stars"></div>
    </header>
    <nav id="navbar">
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="music-player.html" target="_blank">Music</a></li>
            <li><a href="#games">Games</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="section-divider"></div>
        <section id="about" class="section fade-in">
            <h2>About Me</h2>
            <p>Write a brief introduction about yourself, your skills, and your passion for game development and music.</p>
        </section>
        
        <div class="section-divider"></div>
        <section id="games" class="section fade-in">
            <h2>Games</h2>
            <div id="gameVideos">
                <!-- Game videos will be dynamically added here -->
            </div>
        </section>
        
        <div class="section-divider"></div>
        <section id="contact" class="section fade-in">
            <h2>Contact</h2>
            <p>You can reach me at: your.email@example.com</p>
            <!-- Add links to your social media profiles or other contact methods -->
        </section>
    </div>

    <script>
        // Smooth scrolling functionality
        document.querySelectorAll('nav a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                document.getElementById(targetId).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Games section functionality
        const gameVideos = document.getElementById('gameVideos');
        const games = [
            { title: "Game 1", videoId: "dQw4w9WgXcQ", description: "Description of Game 1" },
            { title: "Game 2", videoId: "dQw4w9WgXcQ", description: "Description of Game 2" }
        ];

        games.forEach(game => {
            const videoContainer = document.createElement('div');
            videoContainer.classList.add('video-container');
            videoContainer.innerHTML = `
                <h3>${game.title}</h3>
                <iframe src="https://www.youtube.com/embed/${game.videoId}" 
                        title="${game.title}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
                <p>${game.description}</p>
            `;
            gameVideos.appendChild(videoContainer);
        });

        // Fade-in animation
        function handleIntersection(entries, observer) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationDelay = '0.2s';
                    entry.target.style.animationDuration = '0.8s';
                    entry.target.classList.add('fade-in');
                    observer.unobserve(entry.target);
                }
            });
        }

        const observer = new IntersectionObserver(handleIntersection, {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        });

        document.querySelectorAll('.section, .video-container').forEach(el => {
            observer.observe(el);
        });

        // Hide nav on scroll
        let lastScrollTop = 0;
        const navbar = document.getElementById('navbar');

        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) {
                navbar.style.top = '-70px'; // Adjust the value based on your nav height
            } else {
                navbar.style.top = '0';
            }
            lastScrollTop = scrollTop;
        });
    </script>
</body>
</html>
